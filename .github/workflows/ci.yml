name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install uv
      - run: uv venv .venv
      # `uv venv` seeds no pip, so `python -m pip install` fails here.
      # pytest, not unittest: most of the suite is parametrized, and
      # `unittest discover` silently collects none of those cases.
      - run: uv pip install --python .venv/bin/python -e . pytest pyflakes
      - run: .venv/bin/python -m pytest -q
      - run: .venv/bin/python -m pyflakes src/agent_vitals/
      # Smoke the entry points. A missing import in cli.py passes every
      # unit test and still breaks `av doctor` for every user.
      - run: .venv/bin/av --version
      - run: .venv/bin/av detect
      - run: .venv/bin/av doctor

  html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - run: npx --yes htmlhint docs/index.html
