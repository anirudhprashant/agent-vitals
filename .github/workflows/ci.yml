name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: lts
      - run: npm install -g pyright
      - run: pip install uv
      - run: uv venv .venv
      - run: .venv/bin/python -m pip install -e .
      - run: .venv/bin/python -m unittest discover tests/ -v
      - run: .venv/bin/python -m py_compile src/agent_vitals/*.py
      - run: npx htmlhint docs/index.html || true
      - run: .venv/bin/av --version
      - run: .venv/bin/av detect
      - run: .venv/bin/av doctor
